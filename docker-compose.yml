services:
  postgres:
    image: postgres:17-alpine
    container_name: sketchguess-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sketchguess
      POSTGRES_PASSWORD: sketchguess
      POSTGRES_DB: sketchguess
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sketchguess"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sketchguess-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
